<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JanyTree_Calc Pro</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Noto+Sans+KR:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="pink-theme">
    <div class="app-container">
        <main class="casio-body">
            <!-- 상단 헤더 -->
            <div class="top-header">
                <div class="header-left">
                    <div class="j-plus-logo">J<sup>+</sup></div>
                    <button id="theme-toggle" class="icon-btn-top"><i class="fas fa-moon"></i></button>
                </div>
                <span class="app-name">JanyTree_Calc</span>
                <div class="header-right">
                    <button id="btn-history" class="icon-btn-top"><i class="fas fa-history"></i></button>
                </div>
            </div>

            <!-- LCD 액정 -->
            <div class="lcd-screen">
                <div class="lcd-indicators">
                    <span id="ind-m" class="ind">M</span>
                    <span id="ind-k" class="ind">K</span>
                    <span id="ind-gt" class="ind">GT</span>
                    <span id="ind-tax" class="ind">TAX+</span>
                </div>
                <div class="display-main" id="display">0</div>
            </div>

            <!-- 모드 선택 -->
            <div class="mode-area-container">
                <div class="mode-selector">
                    <button class="mode-tab active" id="btn-calc-mode">CALCULATOR</button>
                    <button class="mode-tab" id="btn-exch-mode">EXCHANGE</button>
                </div>
            </div>

            <!-- 계산기 키패드 -->
            <div id="calc-keypad" class="keypad active">
                <button class="btn btn-tax" data-action="tax-minus">TAX-</button>
                <button class="btn btn-tax" data-action="tax-plus">TAX+</button>
                <button class="btn btn-func" data-action="m-ex">M/EX</button>
                <button class="btn btn-func" data-action="set">SET</button>
                <button class="btn btn-func" data-action="gt">GT</button>

                <button class="btn btn-mem" data-action="mc">MC</button>
                <button class="btn btn-mem" data-action="mr">MR</button>
                <button class="btn btn-mem" data-action="m-minus">M-</button>
                <button class="btn btn-mem" data-action="m-plus">M+</button>
                <button class="btn btn-op" data-val="/">÷</button>

                <button class="btn btn-func" data-action="root">√</button>
                <button class="btn btn-num" data-val="7">7</button>
                <button class="btn btn-num" data-val="8">8</button>
                <button class="btn btn-num" data-val="9">9</button>
                <button class="btn btn-op" data-val="*">×</button>

                <button class="btn btn-func" data-action="plus-minus">+/—</button>
                <button class="btn btn-num" data-val="4">4</button>
                <button class="btn btn-num" data-val="5">5</button>
                <button class="btn btn-num" data-val="6">6</button>
                <button class="btn btn-op" data-val="-">-</button>

                <button class="btn btn-clear" data-action="clear-entry">C</button>
                <button class="btn btn-num" data-val="1">1</button>
                <button class="btn btn-num" data-val="2">2</button>
                <button class="btn btn-num" data-val="3">3</button>
                <button class="btn btn-op tall" data-val="+">+</button>

                <button class="btn btn-clear" data-action="clear">AC</button>
                <button class="btn btn-num" data-val="0">0</button>
                <button class="btn btn-num" data-val="00">00</button>
                <button class="btn btn-num" data-val=".">·</button>
                <button class="btn btn-op" data-action="calculate">=</button>
            </div>

            <!-- 환율 모드 (요청하신 단위로 수정) -->
            <div id="exch-keypad" class="exch-container">
                <div class="exch-box">
                    <select id="from-currency" class="curr-select">
                        <option value="KRW">한국 KRW</option>
                        <option value="USD">미국 USD</option>
                        <option value="JPY">일본 JPY</option>
                        <option value="EUR">유럽연합 EUR</option>
                        <option value="VND">베트남 VND</option>
                        <option value="THB">태국 THB</option>
                        <option value="PHP">필리핀 PHP</option>
                        <option value="CNY">중국 CNY</option>
                        <option value="GBP">영국 GBP</option>
                    </select>
                    <div class="exch-val" id="exch-from-val">0</div>
                </div>
                <div class="exch-divider"><i class="fas fa-retweet"></i></div>
                <div class="exch-box result">
                    <select id="to-currency" class="curr-select">
                        <option value="USD" selected>미국 USD</option>
                        <option value="KRW">한국 KRW</option>
                        <option value="JPY">일본 JPY</option>
                        <option value="EUR">유럽연합 EUR</option>
                        <option value="VND">베트남 VND</option>
                        <option value="THB">태국 THB</option>
                        <option value="PHP">필리핀 PHP</option>
                        <option value="CNY">중국 CNY</option>
                        <option value="GBP">영국 GBP</option>
                    </select>
                    <div class="exch-val" id="exch-to-val">0</div>
                </div>
            </div>
        </main>

        <!-- 기록 패널 -->
        <aside class="history-panel" id="history-panel">
            <div class="history-header">
                <h3>HISTORY</h3>
                <button id="close-history"><i class="fas fa-times"></i></button>
            </div>
            <div id="history-list" class="history-list"></div>
            <button id="clear-history-btn">CLEAR ALL</button>
        </aside>
    </div>
    <script src="app.js"></script>
</body>

</html>
